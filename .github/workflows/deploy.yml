name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Optional override of the chess bot nametag. Set a repository
          # variable `VITE_CHESS_BOT_NAMETAG` (Settings → Secrets and
          # variables → Actions → Variables) to point the deployed build at
          # a different bot; falls back to production `chess-bot` when unset.
          VITE_CHESS_BOT_NAMETAG: ${{ vars.VITE_CHESS_BOT_NAMETAG || 'chess-bot' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
